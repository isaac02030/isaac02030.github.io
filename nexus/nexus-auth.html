<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bricolage+Grotesque:opsz,wght@12..60,300;12..60,400;12..60,500;12..60,600&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF5C00;
    --fire-dim: rgba(255,92,0,0.1);
    --bg: #0A0A08;
    --bg2: #111110;
    --bg3: #181816;
    --text: #F0EDE6;
    --muted: #6E6C65;
    --muted2: #9A9890;
    --border: rgba(240,237,230,0.07);
    --border2: rgba(240,237,230,0.13);
    --error: #FF4444;
    --success: #44CC88;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html{height:100%;}
  body{
    font-family:'Bricolage Grotesque',sans-serif;
    background:var(--bg);color:var(--text);
    min-height:100vh;overflow-x:hidden;cursor:none;
    display:grid;grid-template-columns:1fr 1fr;
  }

  /* Cursor */
  #cur{position:fixed;width:8px;height:8px;background:var(--fire);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
  #cur-r{position:fixed;width:28px;height:28px;border:1px solid rgba(255,92,0,0.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:opacity .2s;}

  /* Grain */
  body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:0;}

  /* LADO ESQUERDO — visual */
  .left-panel {
    background:var(--bg2);
    display:flex;flex-direction:column;justify-content:space-between;
    padding:48px;position:relative;overflow:hidden;
    border-right:1px solid var(--border);
  }

  .left-glow {
    position:absolute;bottom:-100px;left:-100px;
    width:500px;height:500px;
    background:radial-gradient(ellipse,rgba(255,92,0,0.08) 0%,transparent 65%);
    pointer-events:none;
  }

  .left-logo {
    font-family:'Bebas Neue',sans-serif;
    font-size:28px;letter-spacing:.1em;
    text-decoration:none;color:var(--text);
  }
  .left-logo em{color:var(--fire);font-style:normal;}

  .left-headline {
    position:relative;z-index:1;
  }
  .left-headline h2 {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(52px,5.5vw,80px);
    line-height:.92;letter-spacing:.02em;
    margin-bottom:24px;
  }
  .left-headline h2 .out {
    -webkit-text-stroke:1px rgba(240,237,230,0.2);
    color:transparent;
  }
  .left-headline h2 .fire{color:var(--fire);}
  .left-headline p{
    font-size:15px;font-weight:300;
    color:var(--muted2);line-height:1.7;
    max-width:340px;
  }

  .left-steps {
    display:flex;flex-direction:column;gap:16px;
    position:relative;z-index:1;
  }
  .l-step {
    display:flex;align-items:center;gap:14px;
    font-size:13px;color:var(--muted2);
  }
  .l-step-num {
    font-family:'Bebas Neue',sans-serif;
    font-size:18px;color:var(--fire);
    width:28px;height:28px;border:1px solid rgba(255,92,0,0.3);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* LADO DIREITO — formulário */
  .right-panel {
    display:flex;flex-direction:column;justify-content:center;
    padding:48px 64px;position:relative;
  }

  .form-header {
    margin-bottom:40px;
    animation:up .6s ease both;
  }
  .form-header .tag {
    font-size:11px;font-weight:600;letter-spacing:.1em;
    text-transform:uppercase;color:var(--fire);
    display:flex;align-items:center;gap:8px;
    margin-bottom:16px;
  }
  .form-header .tag::before{content:'';width:20px;height:1px;background:var(--fire);}
  .form-header h1 {
    font-family:'Bebas Neue',sans-serif;
    font-size:52px;line-height:.95;letter-spacing:.02em;
    margin-bottom:8px;
  }
  .form-header p{font-size:14px;color:var(--muted2);}
  .form-header p a{color:var(--fire);text-decoration:none;cursor:none;}
  .form-header p a:hover{text-decoration:underline;}

  /* Tabs registo/login */
  .tabs {
    display:flex;gap:0;margin-bottom:36px;
    border:1px solid var(--border2);
    animation:up .6s .05s ease both;opacity:0;
  }
  .tab {
    flex:1;padding:12px;text-align:center;
    font-size:13px;font-weight:500;letter-spacing:.03em;
    color:var(--muted);cursor:none;
    transition:background .2s,color .2s;
    border:none;background:transparent;
    font-family:'Bricolage Grotesque',sans-serif;
  }
  .tab.active{background:var(--fire);color:#fff;}
  .tab:not(.active):hover{color:var(--text);}

  /* Form */
  form {
    display:flex;flex-direction:column;gap:18px;
    animation:up .6s .1s ease both;opacity:0;
  }

  .field{display:flex;flex-direction:column;gap:8px;}
  .field label{
    font-size:11px;font-weight:600;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted2);
  }
  .field input {
    background:var(--bg2);
    border:1px solid var(--border2);
    color:var(--text);
    padding:14px 16px;
    font-family:'Bricolage Grotesque',sans-serif;
    font-size:15px;font-weight:400;
    transition:border-color .2s,background .2s;
    outline:none;cursor:none;
    border-radius:0;
    -webkit-appearance:none;
  }
  .field input::placeholder{color:var(--muted);}
  .field input:focus{
    border-color:var(--fire);
    background:var(--bg3);
  }
  .field input.error{border-color:var(--error);}
  .field input.success{border-color:var(--success);}

  .btn-submit {
    background:var(--fire);color:#fff;border:none;
    padding:16px;width:100%;
    font-family:'Bebas Neue',sans-serif;
    font-size:20px;letter-spacing:.06em;
    cursor:none;transition:opacity .2s,transform .15s;
    margin-top:4px;
  }
  .btn-submit:hover{opacity:.88;transform:translateY(-1px);}
  .btn-submit:disabled{opacity:.4;transform:none;cursor:not-allowed;}

  /* Mensagem de feedback */
  .msg {
    padding:12px 16px;font-size:13px;font-weight:500;
    display:none;align-items:center;gap:8px;
    border-left:3px solid;
  }
  .msg.error{border-color:var(--error);background:rgba(255,68,68,0.06);color:#FF8888;display:flex;}
  .msg.success{border-color:var(--success);background:rgba(68,204,136,0.06);color:#66DDAA;display:flex;}

  /* Loading spinner */
  .spinner {
    width:16px;height:16px;
    border:2px solid rgba(255,255,255,0.3);
    border-top-color:#fff;border-radius:50%;
    animation:spin .7s linear infinite;
    display:none;
  }
  .btn-submit.loading .spinner{display:inline-block;}
  .btn-submit.loading .btn-text{display:none;}

  .divider {
    display:flex;align-items:center;gap:12px;
    color:var(--muted);font-size:12px;
  }
  .divider::before,.divider::after{
    content:'';flex:1;height:1px;background:var(--border);
  }

  @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:768px){
    body{grid-template-columns:1fr;}
    .left-panel{display:none;}
    .right-panel{padding:40px 24px;}
  }
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>

<!-- LADO ESQUERDO -->
<div class="left-panel">
  <div class="left-glow"></div>
  <a href="index.html" class="left-logo">NEX<em>U</em>S</a>

  <div class="left-headline">
    <h2>O teu<br><span class="fire">objetivo</span><br><span class="out">começa</span><br>aqui.</h2>
    <p>Define a missão, encontra o par, faz o trabalho. Trinta dias que mudam o resultado.</p>
  </div>

  <div class="left-steps">
    <div class="l-step">
      <div class="l-step-num">1</div>
      <span>Cria a tua conta em 30 segundos</span>
    </div>
    <div class="l-step">
      <div class="l-step-num">2</div>
      <span>Define o objetivo dos próximos 30 dias</span>
    </div>
    <div class="l-step">
      <div class="l-step-num">3</div>
      <span>Recebe o teu parceiro ou rival</span>
    </div>
  </div>
</div>

<!-- LADO DIREITO -->
<div class="right-panel">

  <div class="form-header">
    <div class="tag">Bem-vindo ao Nexus</div>
    <h1 id="form-title">CRIAR CONTA</h1>
    <p id="form-sub">Já tens conta? <a href="#" onclick="switchTab('login')">Entra aqui →</a></p>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-register" onclick="switchTab('register')">Registar</button>
    <button class="tab" id="tab-login" onclick="switchTab('login')">Entrar</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- FORMULÁRIO REGISTO -->
  <form id="form-register" onsubmit="handleRegister(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="reg-username" placeholder="o_teu_nome" autocomplete="off">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="tu@email.com" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="mínimo 6 caracteres">
    </div>
    <div class="field">
      <label>Confirmar Password</label>
      <input type="password" id="reg-confirm" placeholder="repete a password">
    </div>
    <button type="submit" class="btn-submit" id="btn-register">
      <span class="btn-text">CRIAR CONTA →</span>
      <span class="spinner"></span>
    </button>
  </form>

  <!-- FORMULÁRIO LOGIN -->
  <form id="form-login" onsubmit="handleLogin(event)" style="display:none">
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="a tua password">
    </div>
    <button type="submit" class="btn-submit" id="btn-login">
      <span class="btn-text">ENTRAR →</span>
      <span class="spinner"></span>
    </button>
  </form>

</div>

<script>
  const API = 'https://nexus-backend-production-3f61.up.railway.app';

  // Cursor
  const cur=document.getElementById('cur'),curR=document.getElementById('cur-r');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function loop(){
    cur.style.left=mx+'px';cur.style.top=my+'px';
    rx+=(mx-rx)*.1;ry+=(my-ry)*.1;
    curR.style.left=rx+'px';curR.style.top=ry+'px';
    requestAnimationFrame(loop);
  })();
  document.querySelectorAll('button,a,input').forEach(el=>{
    el.addEventListener('mouseenter',()=>{cur.style.transform='translate(-50%,-50%) scale(2)';curR.style.opacity='0';});
    el.addEventListener('mouseleave',()=>{cur.style.transform='translate(-50%,-50%) scale(1)';curR.style.opacity='1';});
  });

  // Trocar entre tabs
  function switchTab(tab) {
    const isRegister = tab === 'register';
    document.getElementById('tab-register').classList.toggle('active', isRegister);
    document.getElementById('tab-login').classList.toggle('active', !isRegister);
    document.getElementById('form-register').style.display = isRegister ? 'flex' : 'none';
    document.getElementById('form-login').style.display   = isRegister ? 'none' : 'flex';
    document.getElementById('form-title').textContent = isRegister ? 'CRIAR CONTA' : 'BEM-VINDO DE VOLTA';
    document.getElementById('form-sub').innerHTML = isRegister
      ? 'Já tens conta? <a href="#" onclick="switchTab(\'login\')">Entra aqui →</a>'
      : 'Ainda não tens conta? <a href="#" onclick="switchTab(\'register\')">Regista-te →</a>';
    hideMsg();
  }

  // Mostrar mensagem
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }
  function hideMsg() {
    document.getElementById('msg').className = 'msg';
  }

  // Loading state
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.classList.toggle('loading', loading);
    btn.disabled = loading;
  }

  // REGISTO
  async function handleRegister(e) {
    e.preventDefault();
    hideMsg();

    const username = document.getElementById('reg-username').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!username || !email || !password) {
      return showMsg('Preenche todos os campos.', 'error');
    }
    if (password.length < 6) {
      return showMsg('A password deve ter pelo menos 6 caracteres.', 'error');
    }
    const confirm = document.getElementById('reg-confirm').value;
    if (password !== confirm) {
      return showMsg('As passwords não coincidem.', 'error');
    }

    setLoading('btn-register', true);

    try {
      const res = await fetch(`${API}/api/users/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || 'Erro ao criar conta.', 'error');
      } else {
        // Guardar token
        localStorage.setItem('nexus_token', data.token);
        localStorage.setItem('nexus_user', JSON.stringify(data.user));
        showMsg('Conta criada! A redirecionar...', 'success');
        setTimeout(() => window.location.href = 'nexus-dashboard.html', 1200);
      }
    } catch (err) {
      showMsg('Erro de ligação ao servidor.', 'error');
    } finally {
      setLoading('btn-register', false);
    }
  }

  // LOGIN
  async function handleLogin(e) {
    e.preventDefault();
    hideMsg();

    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) {
      return showMsg('Preenche todos os campos.', 'error');
    }

    setLoading('btn-login', true);

    try {
      const res = await fetch(`${API}/api/users/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showMsg(data.error || 'Credenciais inválidas.', 'error');
      } else {
        localStorage.setItem('nexus_token', data.token);
        localStorage.setItem('nexus_user', JSON.stringify(data.user));
        showMsg('Bem-vindo de volta! A redirecionar...', 'success');
        setTimeout(() => window.location.href = 'nexus-dashboard.html', 1200);
      }
    } catch (err) {
      showMsg('Erro de ligação ao servidor.', 'error');
    } finally {
      setLoading('btn-login', false);
    }
  }

  // Se já está logado, vai direto ao dashboard
  if (localStorage.getItem('nexus_token')) {
    window.location.href = 'nexus-dashboard.html';
  }
</script>
</body>
</html>
