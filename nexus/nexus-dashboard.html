<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bricolage+Grotesque:opsz,wght@12..60,300;12..60,400;12..60,500;12..60,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF5C00;
    --fire-dim: rgba(255,92,0,0.1);
    --bg: #0A0A08;
    --bg2: #111110;
    --bg3: #181816;
    --text: #F0EDE6;
    --muted: #6E6C65;
    --muted2: #9A9890;
    --border: rgba(240,237,230,0.07);
    --border2: rgba(240,237,230,0.13);
    --success: #44CC88;
    --error: #FF4444;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Bricolage Grotesque',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  #cur{position:fixed;width:8px;height:8px;background:var(--fire);border-radius:50%;pointer-events:none!important;z-index:-1;transform:translate(-50%,-50%);}
  #cur-r{position:fixed;width:28px;height:28px;border:1px solid rgba(255,92,0,0.3);border-radius:50%;pointer-events:none!important;z-index:-1;transform:translate(-50%,-50%);transition:opacity .2s;}

  /* LAYOUT */
  .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{
    background:var(--bg2);border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    padding:32px 0;position:sticky;top:0;height:100vh;
  }
  .sidebar-logo{
    font-family:'Bebas Neue',sans-serif;font-size:24px;
    letter-spacing:.1em;padding:0 28px 32px;
    border-bottom:1px solid var(--border);
  }
  .sidebar-logo em{color:var(--fire);font-style:normal;}

  .sidebar-nav{padding:24px 0;flex:1;}
  .nav-item{
    display:flex;align-items:center;gap:12px;
    padding:12px 28px;font-size:13px;font-weight:500;
    color:var(--muted);transition:color .2s,background .2s;
    border:none;background:transparent;width:100%;text-align:left;
    font-family:'Bricolage Grotesque',sans-serif;
    position:relative;
  }
  .nav-item:hover{color:var(--text);background:rgba(240,237,230,0.03);}
  .nav-item.active{color:var(--fire);}
  .nav-item.active::before{
    content:'';position:absolute;left:0;top:0;bottom:0;
    width:2px;background:var(--fire);
  }
  .nav-icon{font-size:16px;width:20px;text-align:center;}

  .sidebar-user{
    padding:20px 28px;border-top:1px solid var(--border);
    display:flex;align-items:center;gap:12px;
  }
  .user-avatar{
    width:36px;height:36px;background:var(--fire-dim);
    border:1px solid rgba(255,92,0,0.3);
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--fire);
    flex-shrink:0;
  }
  .user-info{flex:1;min-width:0;}
  .user-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .user-role{font-size:11px;color:var(--muted);}
  .btn-logout{
    background:transparent;border:none;color:var(--muted);
    font-size:16px;padding:4px;transition:color .2s;
  }
  .btn-logout:hover{color:var(--error);}

  /* MAIN */
  .main{padding:48px;overflow-y:auto;}

  .main-header{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:48px;
  }
  .main-header h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:48px;line-height:.95;letter-spacing:.02em;
  }
  .main-header h1 span{color:var(--fire);}
  .main-header p{font-size:14px;color:var(--muted2);margin-top:6px;}

  .btn-new-mission{
    background:var(--fire);color:#fff;border:none;
    padding:12px 24px;
    font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.06em;
    transition:opacity .2s,transform .15s;white-space:nowrap;
  }
  .btn-new-mission:hover{opacity:.88;transform:translateY(-1px);}

  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--border);margin-bottom:32px;}
  .stat-card{background:var(--bg);padding:28px 24px;}
  .stat-card .stat-num{
    font-family:'Bebas Neue',sans-serif;font-size:52px;
    color:var(--fire);line-height:1;
  }
  .stat-card .stat-label{font-size:12px;color:var(--muted2);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;}

  /* MISSÃO ATIVA */
  .section-label{
    font-size:11px;font-weight:600;letter-spacing:.1em;
    text-transform:uppercase;color:var(--fire);
    margin-bottom:20px;
  }

  .mission-card{
    background:var(--bg2);border:1px solid var(--border);
    padding:32px;margin-bottom:32px;
    animation:up .5s ease both;
  }
  .mission-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;}
  .mission-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.03em;}
  .mission-mode{
    padding:4px 12px;font-size:10px;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;
  }
  .mission-mode.rival{background:rgba(255,92,0,0.1);color:var(--fire);}
  .mission-mode.parceiro{background:rgba(68,204,136,0.1);color:var(--success);}
  .mission-mode.solo{background:rgba(240,237,230,0.06);color:var(--muted2);}

  /* Barra de progresso */
  .progress-wrap{margin-bottom:24px;}
  .progress-info{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:var(--muted2);}
  .progress-bar{height:4px;background:rgba(240,237,230,0.08);position:relative;}
  .progress-fill{height:100%;background:var(--fire);transition:width .6s ease;}

  /* Placar rival */
  .score-section{
    display:grid;grid-template-columns:1fr auto 1fr;
    gap:16px;align-items:center;
    padding:20px;background:var(--bg3);
    margin-bottom:24px;
  }
  .score-side{text-align:center;}
  .score-side .s-name{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
  .score-side .s-num{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:1;}
  .score-side .s-num.fire{color:var(--fire);}
  .score-vs{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--border2);}

  /* Check-in */
  .checkin-section{display:flex;align-items:center;gap:16px;}
  .btn-checkin{
    flex:1;background:var(--fire);color:#fff;border:none;
    padding:14px;font-family:'Bebas Neue',sans-serif;
    font-size:18px;letter-spacing:.06em;
    transition:opacity .2s;
  }
  .btn-checkin:hover{opacity:.88;}
  .btn-checkin:disabled{background:rgba(68,204,136,0.2);color:var(--success);cursor:not-allowed;opacity:1;}
  .checkin-note{font-size:12px;color:var(--muted2);}

  /* GRID inferior */
  .bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}

  /* Mini calendário */
  .calendar-card{background:var(--bg2);border:1px solid var(--border);padding:28px;}
  .calendar-card h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;margin-bottom:20px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-day{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:500;
    border:1px solid var(--border);
  }
  .cal-day.done{background:rgba(255,92,0,0.15);border-color:rgba(255,92,0,0.3);color:var(--fire);}
  .cal-day.missed{background:rgba(255,68,68,0.06);border-color:rgba(255,68,68,0.15);color:var(--error);}
  .cal-day.today{border-color:var(--fire);color:var(--text);}
  .cal-day.future{opacity:.25;}

  /* Chat */
  .chat-card{background:var(--bg2);border:1px solid var(--border);padding:28px;display:flex;flex-direction:column;}
  .chat-card h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em;margin-bottom:16px;}
  .chat-messages{flex:1;overflow-y:auto;max-height:220px;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
  .chat-msg{padding:10px 14px;max-width:80%;font-size:13px;line-height:1.5;}
  .chat-msg.mine{background:rgba(255,92,0,0.12);border-left:2px solid var(--fire);align-self:flex-end;}
  .chat-msg.theirs{background:var(--bg3);border-left:2px solid var(--border2);align-self:flex-start;}
  .chat-msg .msg-sender{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
  .chat-input-row{display:flex;gap:0;}
  .chat-input{
    flex:1;background:var(--bg3);border:1px solid var(--border2);
    border-right:none;color:var(--text);padding:12px 14px;
    font-family:'Bricolage Grotesque',sans-serif;font-size:14px;
    outline:none;
  }
  .chat-input::placeholder{color:var(--muted);}
  .chat-input:focus{border-color:var(--fire);}
  .btn-send{
    background:var(--fire);color:#fff;border:none;
    padding:12px 18px;
    font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.06em;
    transition:opacity .2s;
  }
  .btn-send:hover{opacity:.88;}

  /* MODAL nova missão */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.8);
    z-index:1000;display:none;align-items:center;justify-content:center;
    backdrop-filter:blur(4px);
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--bg2);border:1px solid var(--border2);
    padding:48px;width:100%;max-width:500px;
    animation:up .3s ease both;
  }
  .modal h2{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.04em;margin-bottom:32px;}
  .modal .field{margin-bottom:18px;}
  .modal .field label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px;}
  .modal .field input,
  .modal .field select,
  .modal .field textarea{
    width:100%;background:var(--bg3);border:1px solid var(--border2);
    color:var(--text);padding:12px 14px;
    font-family:'Bricolage Grotesque',sans-serif;font-size:14px;
    outline:none;transition:border-color .2s;
    -webkit-appearance:none;
  }
  .modal .field input:focus,
  .modal .field select:focus,
  .modal .field textarea:focus{border-color:var(--fire);}
  .modal .field select option{background:var(--bg2);}
  .modal-actions{display:flex;gap:12px;margin-top:32px;}
  .btn-cancel{
    flex:1;background:transparent;border:1px solid var(--border2);
    color:var(--muted2);padding:14px;
    font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.04em;
    transition:border-color .2s,color .2s;
  }
  .btn-cancel:hover{border-color:var(--text);color:var(--text);}
  .btn-confirm{
    flex:2;background:var(--fire);color:#fff;border:none;
    padding:14px;
    font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.04em;
    transition:opacity .2s;
  }
  .btn-confirm:hover{opacity:.88;}

  /* Estado vazio */
  .empty-state{
    text-align:center;padding:80px 40px;
    border:1px dashed var(--border2);
  }
  .empty-state h3{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--muted);margin-bottom:12px;}
  .empty-state p{font-size:14px;color:var(--muted);margin-bottom:24px;}

  /* Toast */
  .toast{
    position:fixed;bottom:32px;right:32px;
    background:var(--bg2);border:1px solid var(--border2);
    border-left:3px solid var(--success);
    padding:14px 20px;font-size:13px;
    z-index:2000;transform:translateY(20px);opacity:0;
    transition:all .3s ease;pointer-events:none;
  }
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.error{border-left-color:var(--error);}

  /* VÉRTICE */
  .vertice-bar{
    padding:12px 20px;
    border-left:2px solid var(--fire);
    margin-bottom:16px;
    display:flex;align-items:center;gap:12px;
  }
  .vertice-name{
    font-family:'Bebas Neue',sans-serif;
    font-size:11px;letter-spacing:.1em;
    color:var(--fire);flex-shrink:0;
  }
  .vertice-msg{
    font-size:13px;color:var(--muted2);
    font-weight:400;letter-spacing:.01em;
  }

  /* PORTA ABERTA */
  .porta-card{
    background:var(--bg2);border:1px solid rgba(255,92,0,0.3);
    padding:40px;margin-top:24px;text-align:center;
    animation:up .5s ease both;
  }
  .porta-icon{font-size:48px;margin-bottom:16px;}
  .porta-card h3{
    font-family:'Bebas Neue',sans-serif;font-size:36px;
    letter-spacing:.04em;color:var(--fire);margin-bottom:12px;
  }
  .porta-card p{font-size:15px;color:var(--muted2);line-height:1.7;max-width:400px;margin:0 auto 28px;}
  .porta-input{
    width:100%;max-width:360px;
    background:var(--bg3);border:1px solid var(--border2);
    color:var(--text);padding:14px 16px;
    font-family:'Bricolage Grotesque',sans-serif;font-size:15px;
    outline:none;margin-bottom:16px;
    transition:border-color .2s;
  }
  .porta-input:focus{border-color:var(--fire);}
  .btn-porta{
    background:var(--fire);color:#fff;border:none;
    padding:14px 36px;
    font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.06em;
    transition:opacity .2s,transform .15s;
  }
  .btn-porta:hover{opacity:.88;transform:translateY(-1px);}
  .porta-resultado{
    margin-top:24px;padding:20px;
    background:rgba(68,204,136,0.06);
    border:1px solid rgba(68,204,136,0.2);
  }
  .porta-resultado .contact-name{
    font-size:13px;color:var(--muted2);text-transform:uppercase;
    letter-spacing:.06em;margin-bottom:8px;
  }
  .porta-resultado .contact-value{
    font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--success);
    letter-spacing:.04em;
  }
  .porta-waiting{
    margin-top:16px;font-size:13px;color:var(--muted);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .porta-waiting::before{
    content:'';width:6px;height:6px;background:var(--fire);
    border-radius:50%;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0;
  }

  @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

  /* SUGESTÃO DE COMUNIDADE */
  .suggest-card{
    background:var(--bg2);border:1px solid rgba(255,92,0,0.25);
    padding:28px;margin-top:24px;
    display:flex;align-items:center;gap:20px;
    animation:up .5s ease both;
    position:relative;overflow:hidden;
  }
  .suggest-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:var(--fire);
  }
  .suggest-icon{font-size:36px;flex-shrink:0;}
  .suggest-body{flex:1;}
  .suggest-body .suggest-label{
    font-size:10px;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:var(--fire);margin-bottom:6px;
  }
  .suggest-body h4{
    font-family:'Bebas Neue',sans-serif;font-size:20px;
    letter-spacing:.03em;margin-bottom:4px;
  }
  .suggest-body p{font-size:13px;color:var(--muted2);line-height:1.5;}
  .suggest-actions{display:flex;gap:8px;margin-top:14px;}
  .btn-suggest-yes{
    background:var(--fire);color:#fff;border:none;
    padding:9px 20px;font-family:'Bebas Neue',sans-serif;
    font-size:14px;letter-spacing:.06em;transition:opacity .2s;
  }
  .btn-suggest-yes:hover{opacity:.88;}
  .btn-suggest-no{
    background:transparent;border:1px solid var(--border2);
    color:var(--muted2);padding:9px 16px;
    font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.04em;
    transition:border-color .2s,color .2s;
  }
  .btn-suggest-no:hover{border-color:var(--text);color:var(--text);}
  .consist-bar{height:3px;background:rgba(240,237,230,0.08);margin-top:8px;width:100%;}
  .consist-fill{height:100%;background:var(--fire);transition:width .6s ease;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.8)}}
  .notif-dot{
    width:8px;height:8px;background:var(--fire);border-radius:50%;
    margin-left:auto;flex-shrink:0;
    animation:pulse 1.8s ease-in-out infinite;
  }

  /* Fix cursor em mobile */
  @media(hover:none),(pointer:coarse){
    body{cursor:auto!important;}
    #cur,#cur-r{display:none!important;}
    button,a{cursor:pointer!important;}
  }
  @media(max-width:900px){
    .layout{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .main{padding:24px;}
    .bottom-grid{grid-template-columns:1fr;}
    .stats-row{grid-template-columns:1fr 1fr 1fr;}
  }
</style>
<style>
  :root {
    --fire: #ff6a1a;
    --fire-dim: rgba(255,106,26,0.14);
    --bg: #071019;
    --bg2: rgba(14,23,34,0.88);
    --bg3: rgba(255,255,255,0.04);
    --text: #f4f7fb;
    --muted: #97a4b4;
    --muted2: #6b7b8e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --success: #57d69a;
    --error: #ff6471;
  }

  body {
    font-family: 'Manrope', sans-serif;
    background:
      radial-gradient(circle at top left, rgba(255,106,26,0.16), transparent 24%),
      radial-gradient(circle at bottom right, rgba(87,214,154,0.10), transparent 22%),
      linear-gradient(180deg, #071019 0%, #09121b 100%);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 72px 72px;
    opacity: .16;
    pointer-events: none;
  }
  #cur,#cur-r{display:none!important;}

  .layout {
    width: min(1480px, calc(100% - 28px));
    margin: 14px auto;
    grid-template-columns: 290px 1fr;
    gap: 18px;
    min-height: calc(100vh - 28px);
  }
  .sidebar,
  .mission-card,
  .stat-card,
  .calendar-card,
  .chat-card,
  .empty-state,
  .porta-card,
  .suggest-card,
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 28px 80px rgba(0,0,0,0.38);
    backdrop-filter: blur(18px);
  }
  .sidebar {
    padding: 22px;
    border-right: 1px solid var(--border);
  }
  .sidebar-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 4px 24px;
    border-bottom: 1px solid var(--border);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: .08em;
  }
  .sidebar-logo::before {
    content: 'N';
    width: 42px;
    height: 42px;
    border-radius: 14px;
    display: grid;
    place-items: center;
    color: #fff;
    background: linear-gradient(135deg, var(--fire), #ff9457);
    box-shadow: 0 16px 28px rgba(255,106,26,0.28);
  }
  .sidebar-nav { display:grid; gap:10px; }
  .nav-item {
    border: 1px solid transparent;
    border-radius: 16px;
    padding: 14px 16px;
    color: var(--muted);
    font-size: .96rem;
    font-weight: 600;
  }
  .nav-item:hover {
    color: var(--text);
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.05);
  }
  .nav-item.active {
    color: #fff;
    background: linear-gradient(135deg, rgba(255,106,26,0.20), rgba(255,255,255,0.03));
    border-color: rgba(255,106,26,0.24);
  }
  .nav-item.active::before { display:none; }
  .nav-icon {
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    color: var(--fire);
  }
  .sidebar-user {
    margin-top: 10px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .user-avatar {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    border: 1px solid rgba(255,106,26,0.22);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.1rem;
  }
  .btn-logout {
    width: 40px;
    height: 40px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);

  .btn-new-mission,

  }

  .mission-card { padding: 24px; margin-bottom: 22px; }
  .mission-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.5rem, 3vw, 2.3rem);
    letter-spacing: -.04em;
  }
  .mission-mode {
    padding: 8px 12px;
    border-radius: 999px;
    font-size: .72rem;
    letter-spacing: .14em;
  }
  .progress-wrap {
    padding: 18px;
    border-radius: 18px;
    background: rgba(0,0,0,0.18);
    border: 1px solid rgba(255,255,255,0.05);

  .progress-bar {
    height: 10px;

  .calendar-card,.chat-card { padding: 22px; }

    .layout{grid-template-columns:1fr;width:min(100%,calc(100% - 20px));}

    .main-header,.checkin-section,.chat-input-row{grid-template-columns:1fr;}

    .mission-top{flex-direction:column;}

</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- MODAL NOVA MISSÃO -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h2>NOVA MISSÃO</h2>
    <div class="field">
      <label>Objetivo</label>
      <input type="text" id="m-title" placeholder="ex: Correr 5km todos os dias">
    </div>
    <div class="field">
      <label>Categoria</label>
      <select id="m-category">
        <option value="fitness">Fitness / Desporto</option>
        <option value="aprendizagem">Aprendizagem</option>
        <option value="habito">Hábito diário</option>
        <option value="criatividade">Criatividade</option>
        <option value="outro">Outro</option>
      </select>
    </div>
    <div class="field">
      <label>Nível</label>
      <select id="m-level">
        <option value="iniciante">Iniciante</option>
        <option value="intermedio">Intermédio</option>
        <option value="avancado">Avançado</option>
      </select>
    </div>
    <div class="field">
      <label>Modo</label>
      <select id="m-mode">
        <option value="rival">Rival — competir com alguém</option>
        <option value="parceiro">Parceiro — cooperar com alguém</option>
        <option value="solo">Solo — IA como companheiro</option>
      </select>
    </div>
    <div class="field">
      <label>Descrição (opcional)</label>
      <textarea id="m-desc" rows="2" placeholder="mais detalhes sobre o teu objetivo..." style="resize:none"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('modal').classList.remove('open')">CANCELAR</button>
      <button class="btn-confirm" onclick="createMission()">CRIAR MISSÃO →</button>
    </div>
  </div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">NEX<em>U</em>S</div>
    <nav class="sidebar-nav">
      <button class="nav-item active" id="nav-dashboard" onclick="showSection('overview')">
        <span class="nav-icon">◎</span> Dashboard
        <span class="notif-dot" id="dot-rival" style="display:none"></span>
      </button>
      <button class="nav-item" onclick="showSection('missions')">
        <span class="nav-icon">⬡</span> Missões
      </button>
      <button class="nav-item" id="nav-chat" onclick="showSection('chat');clearChatDot()">
        <span class="nav-icon">⇄</span> Chat
        <span class="notif-dot" id="dot-chat" style="display:none"></span>
      </button>
      <a class="nav-item" href="nexus-communities.html" style="text-decoration:none">
        <span class="nav-icon">⬡</span> Comunidades
      </a>
      <a class="nav-item" href="nexus-profile.html" style="text-decoration:none">
        <span class="nav-icon">◈</span> Perfil
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-username">Carregando...</div>
        <div class="user-role">Membro Nexus</div>
      </div>
      <button class="btn-logout" onclick="logout()" title="Sair">✕</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <div>
        <h1>OLÁ, <span id="header-name">—</span></h1>
        <p id="header-date"></p>
      </div>
      <button class="btn-new-mission" onclick="document.getElementById('modal').classList.add('open')">+ NOVA MISSÃO</button>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-missions">0</div>
        <div class="stat-label">Missões ativas</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-days">0</div>
        <div class="stat-label">Dias completados</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-streak">0</div>
        <div class="stat-label">Sequência atual</div>
      </div>
    </div>

    <!-- MISSÃO ATIVA -->
    <p class="section-label">Missão ativa</p>
    <div id="mission-area">
      <div class="empty-state">
        <h3>NENHUMA MISSÃO ATIVA</h3>
        <p>Define o teu objetivo e começa hoje.</p>
        <button class="btn-new-mission" onclick="document.getElementById('modal').classList.add('open')">+ CRIAR PRIMEIRA MISSÃO</button>
      </div>
    </div>

    <!-- BOTTOM GRID -->
    <div class="bottom-grid" id="bottom-grid" style="display:none">
      <!-- Calendário -->
      <div class="calendar-card">
        <h3>PROGRESSO DO MÊS</h3>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
      <!-- Chat -->
      <div class="chat-card">
        <h3>CHAT</h3>
        <div class="chat-messages" id="chat-messages">
          <div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">Sem mensagens ainda.</div>
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" placeholder="Escreve uma mensagem..." onkeydown="return handleChatKeydown(event)">
          <button class="btn-send" id="btn-send" type="button" onclick="return sendMessage(event)">ENVIAR</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const API = 'https://nexus-backend-production-3f61.up.railway.app';

  // Estado
  let user = null;
  let token = null;
  let activeMission = null;
  let chatInterval = null;

  const cur=document.getElementById('cur'),curR=document.getElementById('cur-r');
  if(cur) cur.style.display='none';
  if(curR) curR.style.display='none';

  // Toast
  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type==='error' ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  // Auth
  function logout() {
    localStorage.removeItem('nexus_token');
    localStorage.removeItem('nexus_user');
    window.location.href = 'nexus-auth.html';
  }

  function closeModal(e) {
    if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
  }

  // Init
  async function init() {
    token = localStorage.getItem('nexus_token');
    const userData = localStorage.getItem('nexus_user');

    if (!token || !userData) {
      window.location.href = 'nexus-auth.html';
      return;
    }

    user = JSON.parse(userData);

    // Preencher UI com dados do utilizador
    document.getElementById('header-name').textContent = user.username.toUpperCase();
    document.getElementById('sidebar-username').textContent = user.username;
    document.getElementById('sidebar-avatar').textContent = user.username[0].toUpperCase();

    // Data de hoje
    const now = new Date();
    document.getElementById('header-date').textContent =
      now.toLocaleDateString('pt-PT', { weekday:'long', day:'numeric', month:'long' });

    await loadMissions();
    await loadVertice();
    initNotifications();
  }

  // Carregar missões
  async function loadMissions() {
    try {
      const res = await fetch(`${API}/api/missions`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const missions = await res.json();

      const active  = missions.filter(m => m.status === 'active');
      const waiting = missions.filter(m => m.status === 'waiting');

      document.getElementById('stat-missions').textContent = active.length;

      if (active.length > 0) {
        // Tem missão ativa — mostrar normalmente
        activeMission = active[0];
        renderMission(activeMission);
        document.getElementById('bottom-grid').style.display = 'grid';
        await buildCalendar();
        loadStreak();
        loadMessages();
        checkRivalActivity();
        checkPortaAberta();
        checkCommunitySuggestion();
        if (!chatInterval) {
          chatInterval = setInterval(() => { loadMessages(); checkRivalActivity(); }, 8000);
        }

      } else if (waiting.length > 0) {
        // Está em fila de espera — mostrar estado de espera
        renderWaiting(waiting[0]);

      } else {
        // Sem missões — mostrar estado vazio
        document.getElementById('mission-area').innerHTML = `
          <div class="empty-state">
            <h3>NENHUMA MISSÃO ATIVA</h3>
            <p>Define o teu objetivo e começa hoje.</p>
            <button class="btn-new-mission" onclick="document.getElementById('modal').classList.add('open')">+ CRIAR PRIMEIRA MISSÃO</button>
          </div>`;
      }
    } catch(err) {
      console.error(err);
    }
  }

  // Mostrar missão em espera de match
  function renderWaiting(mission) {
    document.getElementById('mission-area').innerHTML = `
      <div class="mission-card" style="border-color:rgba(255,92,0,0.2)">
        <div class="mission-top">
          <div class="mission-title">${mission.title}</div>
          <span class="mission-mode ${mission.mode}">${mission.mode.toUpperCase()}</span>
        </div>
        <div style="display:flex;align-items:center;gap:16px;padding:24px;background:var(--bg3);margin-bottom:16px;">
          <div style="width:12px;height:12px;background:var(--fire);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0"></div>
          <div>
            <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em;margin-bottom:4px">À PROCURA DE ${mission.mode === 'rival' ? 'RIVAL' : 'PARCEIRO'}...</div>
            <div style="font-size:13px;color:var(--muted2)">Serás notificado quando encontrarmos alguém com o mesmo objetivo.</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--border)">
          <div style="background:var(--bg);padding:20px;text-align:center">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--fire)">${mission.category}</div>
            <div style="font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-top:4px">Categoria</div>
          </div>
          <div style="background:var(--bg);padding:20px;text-align:center">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--fire)">${mission.duration_days}</div>
            <div style="font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-top:4px">Dias</div>
          </div>
          <div style="background:var(--bg);padding:20px;text-align:center">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--fire)">${mission.level}</div>
            <div style="font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;margin-top:4px">Nível</div>
          </div>
        </div>
        <div style="margin-top:16px;font-size:13px;color:var(--muted2);text-align:center;padding:12px">
          Partilha o Nexus com um amigo para competir diretamente →
          <button onclick="navigator.clipboard.writeText('isaac02030.github.io/nexus');toast('Link copiado! 🔥')" 
            style="background:var(--fire-dim);border:1px solid rgba(255,92,0,0.3);color:var(--fire);padding:6px 14px;font-size:12px;font-weight:600;margin-left:8px;font-family:'Bricolage Grotesque',sans-serif">
            COPIAR LINK
          </button>
        </div>
      </div>`;

    // Verificar match a cada 15 segundos automaticamente
    setTimeout(loadMissions, 15000);
  }

  // Renderizar missão ativa
  function renderMission(m) {
    const started = new Date(m.started_at);
    const today   = new Date();
    const day     = Math.min(Math.floor((today - started) / 86400000) + 1, m.duration_days);
    const pct     = Math.round((day / m.duration_days) * 100);

    const isRival = m.mode === 'rival';
    const myScore = m.user_score || 0;
    const partnerScore = m.partner_score || 0;

    document.getElementById('stat-days').textContent = day;
    // streak é carregado separadamente via loadStreak()

    const scoreHtml = isRival ? `
      <div class="score-section">
        <div class="score-side">
          <div class="s-name">Tu</div>
          <div class="s-num fire">${myScore}</div>
        </div>
        <div class="score-vs">VS</div>
        <div class="score-side">
          <div class="s-name">${m.partner_name || 'Rival'}</div>
          <div class="s-num">${partnerScore}</div>
        </div>
      </div>` : '';

    document.getElementById('mission-area').innerHTML = `
      <div class="mission-card">
        <div class="mission-top">
          <div class="mission-title">${m.title}</div>
          <span class="mission-mode ${m.mode}">${m.mode.toUpperCase()}</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-info">
            <span>Dia ${day} de ${m.duration_days}</span>
            <span>${pct}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
        </div>
        ${scoreHtml}
        <div class="checkin-section">
          <button class="btn-checkin" id="btn-checkin" onclick="doCheckin()" disabled style="opacity:.4">
            A verificar...
          </button>
          <span class="checkin-note" id="checkin-note">A carregar...</span>
        </div>
      </div>`;
  }

  // Carregar sequência real
  async function loadStreak() {
    if (!activeMission) return;
    try {
      const res = await fetch(`${API}/api/checkins/${activeMission.id}/streak`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      document.getElementById('stat-streak').textContent = data.streak || 0;
      document.getElementById('stat-days').textContent   = data.total  || 0;
    } catch(err) {}
  }

  // Sequência real
  async function loadStreak() {
    if (!activeMission) return;
    try {
      const res = await fetch(`${API}/api/checkins/${activeMission.id}/streak`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      document.getElementById('stat-streak').textContent = data.streak ?? 0;
      document.getElementById('stat-days').textContent   = data.total  ?? 0;
    } catch(err) {}
  }

  // Check-in
  async function doCheckin() {
    if (!activeMission) return;
    const btn = document.getElementById('btn-checkin');
    btn.disabled = true;
    btn.textContent = 'A registar...';

    try {
      const res = await fetch(`${API}/api/checkins`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ mission_id: activeMission.id })
      });
      const data = await res.json();

      if (res.ok) {
        btn.textContent = '✓ FEITO HOJE!';
        toast(data.message || 'Check-in registado! 🔥');
        notifyCheckin(activeMission.id);
        await loadMissions();
      } else {
        btn.disabled = false;
        btn.textContent = '✓ CHECK-IN DE HOJE';
        toast(data.error || 'Erro ao registar.', 'error');
      }
    } catch(err) {
      btn.disabled = false;
      btn.textContent = '✓ CHECK-IN DE HOJE';
      toast('Erro de ligação.', 'error');
    }
  }

  // Calendário de progresso
  async function buildCalendar() {
    if (!activeMission) return;

    let doneDays = new Set();
    try {
      const res = await fetch(`${API}/api/checkins/${activeMission.id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (data.progress && data.progress[user.id]) {
        data.progress[user.id].checkins
          .filter(c => c.completed)
          .forEach(c => doneDays.add(c.day));
      }
    } catch(err) {}

    const started  = new Date(activeMission.started_at);
    const today    = new Date();
    const todayDay = Math.floor((today - started) / (1000 * 60 * 60 * 24)) + 1;
    const grid     = document.getElementById('cal-grid');
    grid.innerHTML = '';

    for (let i = 1; i <= activeMission.duration_days; i++) {
      const div = document.createElement('div');
      div.className = 'cal-day';
      if (i > todayDay) {
        div.classList.add('future');
      } else if (i === todayDay) {
        div.classList.add(doneDays.has(i) ? 'done' : 'today');
      } else {
        div.classList.add(doneDays.has(i) ? 'done' : 'missed');
      }
      div.textContent = i;
      grid.appendChild(div);
    }

    const btn = document.getElementById('btn-checkin');
    const note = document.getElementById('checkin-note');
    if (btn) {
      if (doneDays.has(todayDay)) {
        btn.textContent = '\u2713 FEITO HOJE!';
        btn.disabled = true;
        btn.style.opacity = '1';
        if (note) note.textContent = 'Voltas amanhã para o dia ' + (todayDay + 1) + '.';
      } else {
        btn.textContent = '\u2713 CHECK-IN DE HOJE';
        btn.disabled = false;
        btn.style.opacity = '1';
        if (note) note.textContent = 'Regista o teu progresso de hoje.';
      }
    }
  }

  // Chat
  let lastMsgId = null;
  async function loadMessages() {
    if (!activeMission) return;
    try {
      const res = await fetch(`${API}/api/messages/${activeMission.id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      const msgs = data.messages || [];
      const container = document.getElementById('chat-messages');

      if (msgs.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">Sem mensagens ainda.</div>';
        return;
      }

      // Não re-renderizar se não houve mensagens novas
      const newestId = msgs[msgs.length - 1]?.id;
      if (newestId === lastMsgId) return;
      lastMsgId = newestId;

      container.innerHTML = msgs.map(m => `
        <div class="chat-msg ${m.sender_id === user.id ? 'mine' : 'theirs'}">
          <div class="msg-sender">${m.sender_name}</div>
          ${m.content}
        </div>`).join('');

      checkUnreadMessages(msgs);
      container.scrollTop = container.scrollHeight;
    } catch(err) {}
  }

  let isSending = false;
  let lastSentContent = '';
  let lastSentAt = 0;

  function handleChatKeydown(event) {
    if (event.key !== 'Enter' || event.repeat || event.isComposing) return true;
    event.preventDefault();
    event.stopPropagation();
    sendMessage(event);
    return false;
  }

  async function sendMessage(event) {
    if (event) {
      event.preventDefault();
      event.stopPropagation();
    }
    if (isSending) return;
    const input = document.getElementById('chat-input');
    const btn = document.getElementById('btn-send');
    const content = input.value.trim();
    if (!content || !activeMission) return;

    const now = Date.now();
    if (content === lastSentContent && (now - lastSentAt) < 2500) return;

    isSending = true;
    lastSentContent = content;
    lastSentAt = now;
    if (btn) {
      btn.disabled = true;
      btn.style.opacity = '.6';
    }
    input.disabled = true;
    input.value = '';
    try {
      const res = await fetch(`${API}/api/messages`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ mission_id: activeMission.id, content })
      });
      if (!res.ok) {
        throw new Error('send_failed');
      }
      notifyMessage(activeMission.id);
      await loadMessages();
    } catch(err) {
      input.value = content;
      lastSentContent = '';
      lastSentAt = 0;
      toast('Erro ao enviar mensagem.', 'error');
    } finally {
      input.disabled = false;
      if (btn) {
        btn.disabled = false;
        btn.style.opacity = '1';
      }
      input.focus();
      isSending = false;
    }
  }

  // Criar missão
  async function createMission() {
    const title    = document.getElementById('m-title').value.trim();
    const category = document.getElementById('m-category').value;
    const level    = document.getElementById('m-level').value;
    const mode     = document.getElementById('m-mode').value;
    const desc     = document.getElementById('m-desc').value.trim();

    if (!title) return toast('Escreve o objetivo da missão.', 'error');

    try {
      const res = await fetch(`${API}/api/missions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ title, category, level, mode, description: desc })
      });
      const data = await res.json();

      if (res.ok) {
        document.getElementById('modal').classList.remove('open');
        toast(data.message || 'Missão criada!');
        await loadMissions();
      } else {
        toast(data.error || 'Erro ao criar missão.', 'error');
      }
    } catch(err) {
      toast('Erro de ligação.', 'error');
    }
  }

  function showSection(s) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    event.target.closest('.nav-item').classList.add('active');
  }

  // Verificar se o rival fez check-in hoje mas tu não
  async function checkRivalActivity() {
    if (!activeMission || !activeMission.partner_id) return;
    try {
      const res = await fetch(`${API}/api/checkins/${activeMission.id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (!data.progress) return;

      const started   = new Date(activeMission.started_at);
      const today     = new Date();
      const todayDay  = Math.floor((today - started) / (1000 * 60 * 60 * 24)) + 1;

      // Check-ins do utilizador
      const myCheckins = data.progress[user.id]?.checkins || [];
      const idoneToday = myCheckins.some(c => c.day === todayDay && c.completed);

      // Check-ins do rival
      const partnerId = activeMission.user_id === user.id
        ? activeMission.partner_id
        : activeMission.user_id;
      const rivalCheckins = data.progress[partnerId]?.checkins || [];
      const rivalDoneToday = rivalCheckins.some(c => c.day === todayDay && c.completed);

      // Mostrar dot se rival fez e eu não fiz
      const dot = document.getElementById('dot-rival');
      if (dot) dot.style.display = (rivalDoneToday && !idoneToday) ? 'block' : 'none';

    } catch(err) {}
  }

  // Verificar mensagens não lidas
  let lastMessageCount = 0;
  function checkUnreadMessages(msgs) {
    const dot = document.getElementById('dot-chat');
    if (!dot) return;
    if (msgs.length > lastMessageCount) {
      // Só mostrar se não estiver na secção de chat
      const chatNav = document.getElementById('nav-chat');
      if (chatNav && !chatNav.classList.contains('active')) {
        dot.style.display = 'block';
      }
    }
    lastMessageCount = msgs.length;
  }

  function clearChatDot() {
    const dot = document.getElementById('dot-chat');
    if (dot) dot.style.display = 'none';
    lastMessageCount = document.querySelectorAll('.chat-msg').length;
  }

  // ============================================
  // SUGESTÃO DE COMUNIDADE
  // ============================================
  async function checkCommunitySuggestion() {
    if (!activeMission || activeMission.status !== 'active') return;

    // Só verificar se já passou o dia 15
    const started  = new Date(activeMission.started_at);
    const today    = new Date();
    const dayNum   = Math.floor((today - started) / (1000 * 60 * 60 * 24)) + 1;
    if (dayNum < 15) return;

    // Verificar se já dispensou a sugestão
    const dismissed = localStorage.getItem(`nexus_suggest_${activeMission.id}`);
    if (dismissed) return;

    try {
      const res = await fetch(`${API}/api/communities/smart-suggest/${activeMission.id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();

      if (data.suggest && data.community) {
        renderCommunitySuggestion(data);
      }
    } catch(err) {}
  }

  function renderCommunitySuggestion(data) {
    const area = document.getElementById('mission-area');
    if (!area || document.getElementById('suggest-card')) return;

    const c = data.community;
    area.insertAdjacentHTML('beforeend', `
      <div class="suggest-card" id="suggest-card">
        <div class="suggest-icon">${c.icon}</div>
        <div class="suggest-body">
          <div class="suggest-label">✦ Sugestão do Nexus — Dia ${data.day}</div>
          <h4>${c.name}</h4>
          <p>${data.message} Há uma comunidade para o teu objetivo com ${c.member_count} membros.</p>
          <div class="consist-bar">
            <div class="consist-fill" style="width:${data.consistency}%"></div>
          </div>
          <div class="suggest-actions">
            <button class="btn-suggest-yes" onclick="joinFromSuggestion('${c.slug}')">VER COMUNIDADE →</button>
            <button class="btn-suggest-no" onclick="dismissSuggestion()">Agora não</button>
          </div>
        </div>
      </div>`);
  }

  async function joinFromSuggestion(slug) {
    window.location.href = `nexus-communities.html`;
  }

  function dismissSuggestion() {
    if (activeMission) {
      localStorage.setItem(`nexus_suggest_${activeMission.id}`, 'dismissed');
    }
    const card = document.getElementById('suggest-card');
    if (card) card.remove();
  }

  // ============================================
  // PORTA ABERTA
  // ============================================
  async function checkPortaAberta() {
    if (!activeMission || activeMission.status !== 'completed') return;

    try {
      const res = await fetch(`${API}/api/porta-aberta/${activeMission.id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      renderPortaAberta(data);
    } catch(err) {}
  }

  function renderPortaAberta(data) {
    const area = document.getElementById('mission-area');
    if (!area) return;

    if (data.both_open && data.partner_contact) {
      // Ambos abriram — mostrar contacto
      area.insertAdjacentHTML('beforeend', `
        <div class="porta-card">
          <div class="porta-icon">🔓</div>
          <h3>PORTA ABERTA!</h3>
          <p>Os 30 dias foram completados. Aqui está o contacto de <strong>${data.partner_name}</strong>:</p>
          <div class="porta-resultado">
            <div class="contact-name">Contacto de ${data.partner_name}</div>
            <div class="contact-value">${data.partner_contact}</div>
          </div>
        </div>`);

    } else if (data.i_opened) {
      // Eu já abri, a aguardar o rival
      area.insertAdjacentHTML('beforeend', `
        <div class="porta-card">
          <div class="porta-icon">⏳</div>
          <h3>AGUARDANDO ${data.partner_name.toUpperCase()}</h3>
          <p>Já partilhaste o teu contacto. Quando <strong>${data.partner_name}</strong> abrir a porta, os contactos ficam visíveis para os dois.</p>
          <div class="porta-waiting">A aguardar que ${data.partner_name} abra a porta...</div>
        </div>`);

    } else {
      // Missão completa mas ainda não abriu a porta
      area.insertAdjacentHTML('beforeend', `
        <div class="porta-card">
          <div class="porta-icon">🚪</div>
          <h3>PORTA ABERTA</h3>
          <p>Completaste os 30 dias com <strong>${data.partner_name}</strong>! Se quiserem manter o contacto fora do Nexus, partilha o teu contacto. É mútuo — só vês o dele se ele também partilhar.</p>
          <input class="porta-input" id="porta-contact" placeholder="email, instagram, número..." maxlength="100">
          <br>
          <button class="btn-porta" onclick="abrirPorta()">ABRIR A PORTA →</button>
        </div>`);
    }
  }

  async function abrirPorta() {
    const contact = document.getElementById('porta-contact')?.value.trim();
    if (!contact) return toast('Escreve um contacto primeiro.', 'error');

    try {
      const res = await fetch(`${API}/api/porta-aberta`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ mission_id: activeMission.id, contact })
      });
      const data = await res.json();

      if (res.ok) {
        toast(data.message);
        await checkPortaAberta();
      } else {
        toast(data.error || 'Erro ao abrir porta.', 'error');
      }
    } catch(err) {
      toast('Erro de ligação.', 'error');
    }
  }

  // ============================================
  // PUSH NOTIFICATIONS
  // ============================================
  async function initNotifications() {
    // Desregistar service workers antigos
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      regs.forEach(r => r.unregister());
    }
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

    try {
      // Obter chave pública do servidor
      const keyRes = await fetch(`${API}/api/notifications/vapid-key`);
      const { publicKey } = await keyRes.json();

      // Pedir permissão
      const permission = await Notification.requestPermission();
      if (permission !== 'granted') return;

      // Registar service worker
      const reg = await navigator.serviceWorker.register('sw.js');
      await navigator.serviceWorker.ready;

      // Subscrever
      const subscription = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey)
      });

      // Enviar subscrição ao servidor
      await fetch(`${API}/api/notifications/subscribe`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ subscription })
      });

      console.log('Notificações ativadas!');
    } catch(err) {
      console.log('Notificações não disponíveis:', err);
    }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  async function notifyCheckin(missionId) {
    try {
      await fetch(`${API}/api/notifications/checkin`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ mission_id: missionId })
      });
    } catch(err) {}
  }

  async function notifyMessage(missionId) {
    try {
      await fetch(`${API}/api/notifications/message`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ mission_id: missionId, sender_name: user.username })
      });
    } catch(err) {}
  }

  // ============================================
  // VÉRTICE
  // ============================================
  async function loadVertice() {
    try {
      const res = await fetch(`${API}/api/vertice/message`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) return;
      const data = await res.json();
      if (!data.message) return;

      // Remover anterior
      const ex = document.getElementById('vertice-bar');
      if (ex) ex.remove();

      // Criar elemento
      const div = document.createElement('div');
      div.id = 'vertice-bar';
      div.className = 'vertice-bar';
      div.innerHTML = '<span class="vertice-name">VÉRTICE</span><span class="vertice-msg"> ' + data.message + '</span>';

      // Inserir antes da missão
      const area = document.getElementById('mission-area');
      if (area) area.parentNode.insertBefore(div, area);

    } catch(err) { console.error('Vertice error:', err); }
  }

  init();
</script>
