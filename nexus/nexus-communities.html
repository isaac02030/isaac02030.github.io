<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Comunidades</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF5C00">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Bricolage+Grotesque:opsz,wght@12..60,300;12..60,400;12..60,500;12..60,600&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF5C00;
    --fire-dim: rgba(255,92,0,0.1);
    --bg: #0A0A08;
    --bg2: #111110;
    --bg3: #181816;
    --text: #F0EDE6;
    --muted: #6E6C65;
    --muted2: #9A9890;
    --border: rgba(240,237,230,0.07);
    --border2: rgba(240,237,230,0.13);
    --success: #44CC88;
    --error: #FF4444;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Bricolage Grotesque',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;cursor:none;}
  #cur{position:fixed;width:8px;height:8px;background:var(--fire);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
  #cur-r{position:fixed;width:28px;height:28px;border:1px solid rgba(255,92,0,0.3);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:opacity .2s;}

  .layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}

  /* SIDEBAR */
  .sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:32px 0;position:sticky;top:0;height:100vh;}
  .sidebar-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.1em;padding:0 28px 32px;border-bottom:1px solid var(--border);}
  .sidebar-logo em{color:var(--fire);font-style:normal;}
  .sidebar-nav{padding:24px 0;flex:1;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:12px 28px;font-size:13px;font-weight:500;color:var(--muted);cursor:none;transition:color .2s,background .2s;border:none;background:transparent;width:100%;text-align:left;font-family:'Bricolage Grotesque',sans-serif;position:relative;text-decoration:none;}
  .nav-item:hover{color:var(--text);background:rgba(240,237,230,0.03);}
  .nav-item.active{color:var(--fire);}
  .nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--fire);}
  .sidebar-user{padding:20px 28px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .user-avatar{width:36px;height:36px;background:var(--fire-dim);border:1px solid rgba(255,92,0,0.3);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--fire);flex-shrink:0;}
  .user-name{font-size:13px;font-weight:500;}
  .user-role{font-size:11px;color:var(--muted);}
  .btn-logout{background:transparent;border:none;color:var(--muted);cursor:none;font-size:16px;padding:4px;transition:color .2s;}
  .btn-logout:hover{color:var(--error);}

  /* MAIN */
  .main{padding:48px;overflow-y:auto;}

  /* VIEWS */
  .view{display:none;}
  .view.active{display:block;}

  /* HEADER */
  .page-header{margin-bottom:48px;}
  .page-header .label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--fire);margin-bottom:16px;}
  .page-header h1{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:.95;letter-spacing:.02em;}
  .page-header h1 .out{-webkit-text-stroke:1px rgba(240,237,230,0.2);color:transparent;}
  .page-header p{font-size:15px;color:var(--muted2);margin-top:10px;max-width:500px;line-height:1.6;}

  /* COMMUNITY CARDS */
  .communities-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;background:var(--border);}
  .comm-card{
    background:var(--bg2);padding:36px;
    transition:background .25s;position:relative;overflow:hidden;
    cursor:none;
  }
  .comm-card:hover{background:var(--bg3);}
  .comm-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
  .comm-icon{
    width:56px;height:56px;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;border:1px solid var(--border2);
    flex-shrink:0;
  }
  .comm-badge{
    padding:4px 12px;font-size:10px;font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;
  }
  .comm-badge.member{background:rgba(68,204,136,0.1);color:var(--success);}
  .comm-badge.open{background:var(--fire-dim);color:var(--fire);}

  .comm-card h3{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.03em;margin-bottom:10px;}
  .comm-card p{font-size:13px;color:var(--muted2);line-height:1.65;margin-bottom:20px;}

  .comm-meta{display:flex;gap:20px;margin-bottom:20px;}
  .comm-meta-item{font-size:12px;color:var(--muted2);}
  .comm-meta-item strong{color:var(--text);font-weight:500;display:block;font-size:18px;font-family:'Bebas Neue',sans-serif;}

  .comm-rank{
    display:flex;align-items:center;gap:8px;
    padding:8px 12px;background:var(--bg3);
    font-size:12px;color:var(--muted2);margin-bottom:16px;
  }
  .comm-rank .rank-badge{
    font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.06em;
  }

  .btn-join{
    width:100%;background:var(--fire);color:#fff;border:none;
    padding:13px;font-family:'Bebas Neue',sans-serif;
    font-size:16px;letter-spacing:.06em;cursor:none;
    transition:opacity .2s;
  }
  .btn-join:hover{opacity:.88;}
  .btn-join.joined{background:transparent;border:1px solid var(--border2);color:var(--muted2);}
  .btn-join.joined:hover{border-color:var(--fire);color:var(--fire);}

  /* COMMUNITY DETAIL VIEW */
  .back-btn{
    display:flex;align-items:center;gap:8px;
    background:transparent;border:none;color:var(--muted2);
    font-size:13px;cursor:none;padding:0;margin-bottom:32px;
    font-family:'Bricolage Grotesque',sans-serif;
    transition:color .2s;
  }
  .back-btn:hover{color:var(--text);}

  .comm-detail-header{
    display:flex;align-items:center;gap:24px;
    padding:32px;background:var(--bg2);border:1px solid var(--border);
    margin-bottom:32px;
  }
  .comm-detail-icon{
    width:72px;height:72px;font-size:36px;
    display:flex;align-items:center;justify-content:center;
    border:2px solid var(--border2);flex-shrink:0;
  }
  .comm-detail-info h2{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.03em;}
  .comm-detail-info p{font-size:14px;color:var(--muted2);margin-top:4px;}
  .comm-detail-stats{display:flex;gap:24px;margin-top:12px;}
  .comm-detail-stat{font-size:12px;color:var(--muted2);}
  .comm-detail-stat strong{color:var(--fire);font-family:'Bebas Neue',sans-serif;font-size:22px;display:block;line-height:1;}

  .detail-grid{display:grid;grid-template-columns:1fr 320px;gap:24px;}

  /* FÓRUM */
  .forum-card{background:var(--bg2);border:1px solid var(--border);padding:28px;}
  .forum-card h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;margin-bottom:20px;}
  .post-input-wrap{display:flex;gap:0;margin-bottom:24px;}
  .post-input{
    flex:1;background:var(--bg3);border:1px solid var(--border2);
    border-right:none;color:var(--text);padding:13px 16px;
    font-family:'Bricolage Grotesque',sans-serif;font-size:14px;
    outline:none;cursor:none;transition:border-color .2s;
  }
  .post-input:focus{border-color:var(--fire);}
  .post-input::placeholder{color:var(--muted);}
  .btn-post{
    background:var(--fire);color:#fff;border:none;
    padding:13px 20px;cursor:none;
    font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.06em;
    transition:opacity .2s;
  }
  .btn-post:hover{opacity:.88;}

  .posts-list{display:flex;flex-direction:column;gap:2px;background:var(--border);}
  .post-item{background:var(--bg2);padding:16px 20px;}
  .post-item:hover{background:var(--bg3);}
  .post-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .post-avatar{width:28px;height:28px;background:var(--fire-dim);border:1px solid rgba(255,92,0,0.2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--fire);flex-shrink:0;}
  .post-username{font-size:13px;font-weight:500;}
  .post-rank{font-size:10px;color:var(--fire);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
  .post-time{font-size:11px;color:var(--muted);margin-left:auto;}
  .post-content{font-size:14px;color:var(--muted2);line-height:1.6;}

  .empty-forum{padding:40px;text-align:center;color:var(--muted);font-size:13px;}

  /* RANKING */
  .ranking-card{background:var(--bg2);border:1px solid var(--border);padding:28px;}
  .ranking-card h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;margin-bottom:20px;}
  .rank-list{display:flex;flex-direction:column;gap:2px;background:var(--border);}
  .rank-item{
    background:var(--bg2);padding:14px 16px;
    display:flex;align-items:center;gap:12px;
    transition:background .2s;
  }
  .rank-item:hover{background:var(--bg3);}
  .rank-pos{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--muted);width:24px;text-align:center;flex-shrink:0;}
  .rank-pos.gold{color:#FFD700;}
  .rank-pos.silver{color:#C0C0C0;}
  .rank-pos.bronze{color:#CD7F32;}
  .rank-avatar{width:32px;height:32px;background:var(--fire-dim);border:1px solid rgba(255,92,0,0.2);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--fire);flex-shrink:0;}
  .rank-info{flex:1;}
  .rank-name{font-size:13px;font-weight:500;}
  .rank-badge-text{font-size:10px;color:var(--fire);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
  .rank-score{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--fire);}

  /* TOAST */
  .toast{position:fixed;bottom:32px;right:32px;background:var(--bg2);border:1px solid var(--border2);border-left:3px solid var(--success);padding:14px 20px;font-size:13px;z-index:2000;transform:translateY(20px);opacity:0;transition:all .3s ease;pointer-events:none;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.error{border-left-color:var(--error);}

  @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

  @media(max-width:900px){
    .layout{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .main{padding:24px;}
    .communities-grid{grid-template-columns:1fr;}
    .detail-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>
<div class="toast" id="toast"></div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">NEX<em>U</em>S</div>
    <nav class="sidebar-nav">
      <a class="nav-item" href="nexus-dashboard.html">
        <span>◎</span> Dashboard
      </a>
      <a class="nav-item" href="nexus-dashboard.html">
        <span>⬡</span> Missões
      </a>
      <a class="nav-item active" href="nexus-communities.html">
        <span>⬡</span> Comunidades
      </a>
      <a class="nav-item" href="nexus-profile.html">
        <span>◈</span> Perfil
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">?</div>
      <div>
        <div class="user-name" id="sidebar-username">—</div>
        <div class="user-role">Membro Nexus</div>
      </div>
      <button class="btn-logout" onclick="logout()" style="margin-left:auto">✕</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- VIEW: LISTA DE COMUNIDADES -->
    <div class="view active" id="view-list">
      <div class="page-header">
        <p class="label">Fase 5 — Modo Liga</p>
        <h1>COMUNIDADES<br><span class="out">NEXUS.</span></h1>
        <p>Entra numa comunidade, compete no ranking e conecta com pessoas com os mesmos objetivos.</p>
      </div>
      <div class="communities-grid" id="communities-grid">
        <div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--muted)">A carregar comunidades...</div>
      </div>
    </div>

    <!-- VIEW: DETALHE DA COMUNIDADE -->
    <div class="view" id="view-detail">
      <button class="back-btn" onclick="showList()">← Voltar às comunidades</button>

      <div class="comm-detail-header" id="detail-header"></div>

      <div class="detail-grid">
        <!-- FÓRUM -->
        <div class="forum-card">
          <h3>FÓRUM</h3>
          <div class="post-input-wrap">
            <input class="post-input" id="post-input" placeholder="Partilha algo com a comunidade..." maxlength="500">
            <button class="btn-post" onclick="submitPost()">PUBLICAR</button>
          </div>
          <div id="posts-list">
            <div class="empty-forum">Ainda não há posts. Sê o primeiro! 🔥</div>
          </div>
        </div>

        <!-- RANKING -->
        <div class="ranking-card">
          <h3>RANKING</h3>
          <div id="ranking-list">
            <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Sem membros ainda.</div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  const API = 'https://nexus-backend-production-3f61.up.railway.app';
  let user = null, token = null;
  let currentCommunity = null;

  // Cursor
  const cur=document.getElementById('cur'),curR=document.getElementById('cur-r');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function loop(){
    cur.style.left=mx+'px';cur.style.top=my+'px';
    rx+=(mx-rx)*.1;ry+=(my-ry)*.1;
    curR.style.left=rx+'px';curR.style.top=ry+'px';
    requestAnimationFrame(loop);
  })();

  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type==='error' ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  function logout() {
    localStorage.removeItem('nexus_token');
    localStorage.removeItem('nexus_user');
    window.location.href = 'nexus-auth.html';
  }

  function showList() {
    document.getElementById('view-list').classList.add('active');
    document.getElementById('view-detail').classList.remove('active');
    currentCommunity = null;
  }

  function showDetail() {
    document.getElementById('view-list').classList.remove('active');
    document.getElementById('view-detail').classList.add('active');
  }

  const RANK_LABELS = {
    recruta: '🎯 Recruta',
    veterano: '⚔️ Veterano',
    elite: '🔥 Elite',
    'campeão': '🏆 Campeão',
    lenda: '👑 Lenda'
  };

  async function init() {
    token = localStorage.getItem('nexus_token');
    const userData = localStorage.getItem('nexus_user');
    if (!token || !userData) { window.location.href = 'nexus-auth.html'; return; }

    user = JSON.parse(userData);
    document.getElementById('sidebar-avatar').textContent = user.username[0].toUpperCase();
    document.getElementById('sidebar-username').textContent = user.username;

    await loadCommunities();
  }

  async function loadCommunities() {
    try {
      const res = await fetch(`${API}/api/communities`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const communities = await res.json();
      renderCommunities(communities);
    } catch(err) {
      document.getElementById('communities-grid').innerHTML =
        '<div style="grid-column:1/-1;padding:40px;text-align:center;color:var(--muted)">Erro ao carregar comunidades.</div>';
    }
  }

  function renderCommunities(communities) {
    if (communities.length === 0) {
      document.getElementById('communities-grid').innerHTML =
        '<div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--muted)">Nenhuma comunidade ainda.</div>';
      return;
    }

    document.getElementById('communities-grid').innerHTML = communities.map(c => `
      <div class="comm-card">
        <div class="comm-card-top">
          <div class="comm-icon" style="border-color:${c.cover_color}20">${c.icon}</div>
          <span class="comm-badge ${c.is_member ? 'member' : 'open'}">${c.is_member ? 'Membro' : 'Aberta'}</span>
        </div>
        <h3>${c.name}</h3>
        <p>${c.description || ''}</p>
        <div class="comm-meta">
          <div class="comm-meta-item">
            <strong>${c.member_count || 0}</strong>
            Membros
          </div>
          <div class="comm-meta-item">
            <strong>${c.category}</strong>
            Categoria
          </div>
        </div>
        ${c.is_member ? `
          <div class="comm-rank">
            <span class="rank-badge" style="color:${c.cover_color}">${RANK_LABELS[c.my_rank] || c.my_rank}</span>
            <span>· ${c.missions_done || 0} missões nesta categoria</span>
          </div>` : ''}
        <div style="display:flex;gap:8px">
          ${c.is_member
            ? `<button class="btn-join joined" onclick="openCommunity('${c.slug}')">VER COMUNIDADE →</button>`
            : `<button class="btn-join" onclick="joinCommunity('${c.slug}', this)">ENTRAR NA COMUNIDADE</button>`
          }
        </div>
      </div>`).join('');
  }

  async function joinCommunity(slug, btn) {
    btn.disabled = true;
    btn.textContent = 'A entrar...';

    try {
      const res = await fetch(`${API}/api/communities/${slug}/join`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();

      if (res.ok) {
        toast(data.message);
        await loadCommunities();
      } else {
        toast(data.error || 'Erro ao entrar.', 'error');
        btn.disabled = false;
        btn.textContent = 'ENTRAR NA COMUNIDADE';
      }
    } catch(err) {
      toast('Erro de ligação.', 'error');
      btn.disabled = false;
      btn.textContent = 'ENTRAR NA COMUNIDADE';
    }
  }

  async function openCommunity(slug) {
    try {
      const res = await fetch(`${API}/api/communities/${slug}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();

      currentCommunity = data.community;
      renderCommunityDetail(data);
      showDetail();
    } catch(err) {
      toast('Erro ao abrir comunidade.', 'error');
    }
  }

  function renderCommunityDetail(data) {
    const c = data.community;

    // Header
    document.getElementById('detail-header').innerHTML = `
      <div class="comm-detail-icon" style="border-color:${c.cover_color}40">${c.icon}</div>
      <div class="comm-detail-info">
        <h2>${c.name}</h2>
        <p>${c.description || ''}</p>
        <div class="comm-detail-stats">
          <div class="comm-detail-stat">
            <strong>${c.member_count || 0}</strong>
            Membros
          </div>
          <div class="comm-detail-stat">
            <strong style="color:${c.cover_color}">${RANK_LABELS[c.my_rank] || '—'}</strong>
            A tua patente
          </div>
        </div>
      </div>`;

    // Ranking
    const rankList = document.getElementById('ranking-list');
    if (data.ranking.length === 0) {
      rankList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Sem membros ainda.</div>';
    } else {
      const posColors = ['gold', 'silver', 'bronze'];
      rankList.innerHTML = `<div class="rank-list">${data.ranking.map((r, i) => `
        <div class="rank-item">
          <div class="rank-pos ${posColors[i] || ''}">${i + 1}</div>
          <div class="rank-avatar">${r.username[0].toUpperCase()}</div>
          <div class="rank-info">
            <div class="rank-name">${r.username}</div>
            <div class="rank-badge-text">${RANK_LABELS[r.rank] || r.rank}</div>
          </div>
          <div class="rank-score">${r.missions_done}</div>
        </div>`).join('')}
      </div>`;
    }

    // Posts
    renderPosts(data.posts);
  }

  function renderPosts(posts) {
    const list = document.getElementById('posts-list');
    if (posts.length === 0) {
      list.innerHTML = '<div class="empty-forum">Ainda não há posts. Sê o primeiro! 🔥</div>';
      return;
    }

    list.innerHTML = `<div class="posts-list">${posts.map(p => `
      <div class="post-item">
        <div class="post-header">
          <div class="post-avatar">${p.username[0].toUpperCase()}</div>
          <div class="post-username">${p.username}</div>
          <div class="post-time">${timeAgo(p.created_at)}</div>
        </div>
        <div class="post-content">${p.content}</div>
      </div>`).join('')}
    </div>`;
  }

  async function submitPost() {
    const input = document.getElementById('post-input');
    const content = input.value.trim();
    if (!content || !currentCommunity) return;

    input.value = '';
    try {
      const res = await fetch(`${API}/api/communities/${currentCommunity.slug}/posts`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ content })
      });

      if (res.ok) {
        await openCommunity(currentCommunity.slug);
        toast('Post publicado! 🔥');
      } else {
        const data = await res.json();
        toast(data.error || 'Erro ao publicar.', 'error');
      }
    } catch(err) {
      toast('Erro de ligação.', 'error');
    }
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'agora';
    if (mins < 60) return `${mins}m`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h`;
    return `${Math.floor(hrs / 24)}d`;
  }

  init();
</script>
